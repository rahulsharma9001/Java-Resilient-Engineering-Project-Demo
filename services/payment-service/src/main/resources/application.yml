server:
  port: 8081

spring:
  application:
    name: payment-service

management:
  endpoints:
    web:
      exposure:
        include: health,info,prometheus,metrics
  endpoint:
    health:
      show-details: always
  metrics:
    tags:
      application: ${spring.application.name}

payment:
  admin:
    username: ${PAYMENT_ADMIN_USERNAME:payment-admin}
    password: ${PAYMENT_ADMIN_PASSWORD:change-this-password}
