server:
  port: 8080

spring:
  application:
    name: order-service

management:
  # Expose actuator + resilience endpoints for demo and observability.
  endpoints:
    web:
      exposure:
        include: health,info,prometheus,metrics,circuitbreakers,circuitbreakerevents
  endpoint:
    health:
      show-details: always
  metrics:
    tags:
      application: ${spring.application.name}

resilience4j:
  # Used by @CircuitBreaker(name = "paymentService")
  # Opens when failure rate crosses threshold in recent call window.
  # "If too many failures happen, stop calling payment for some time and return fallback immediately."
  circuitbreaker:
    instances:
      paymentService:
        registerHealthIndicator: true
        slidingWindowSize: 5
        failureRateThreshold: 50
        waitDurationInOpenState: 10s
        permittedNumberOfCallsInHalfOpenState: 2
        minimumNumberOfCalls: 3

  # Used by @Retry(name = "paymentService")
  # Retries transient failures before fallback.
  # "If payment fails, try again a few times before fallback."
  retry:
    instances:
      paymentService:
        maxAttempts: 3
        waitDuration: 500ms

  # Used by @TimeLimiter(name = "paymentService")
  # Timeout boundary for downstream payment call.
  # "If payment takes too long, stop waiting and go to fallback."
  timelimiter:
    instances:
      paymentService:
        timeoutDuration: 1500ms

  # Used by @RateLimiter(name = "paymentService")
  # Limits request rate to protect downstream service during spikes.
  # "Allow only limited calls per second to protect payment-service."
  ratelimiter:
    instances:
      paymentService:
        limitRefreshPeriod: 1s
        limitForPeriod: 5
        timeoutDuration: 0

  # Used by @Bulkhead(name = "paymentService")
  # Limits concurrent payment calls so resources are not exhausted.
  # "Allow only limited concurrent calls so one slow dependency doesn't consume all resources."
  bulkhead:
    instances:
      paymentService:
        maxConcurrentCalls: 4
        maxWaitDuration: 0

payment:
  service:
    # Downstream dependency URL (overridden in Docker/Kubernetes via env var).
    url: ${PAYMENT_SERVICE_URL:http://localhost:8081}
